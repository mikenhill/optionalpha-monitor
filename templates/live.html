<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live GEX</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f8f9fa; }
    .nav { background: #212529; padding: 10px 20px; margin: -20px -20px 20px -20px; display: flex; gap: 5px; }
    .nav a { padding: 6px 14px; text-decoration: none; color: #adb5bd; border-radius: 4px; font-size: 14px; }
    .nav a:hover { background: #343a40; color: #fff; }
    .nav a.active { background: #0d6efd; color: #fff; }
    .card { background: #fff; border: 1px solid #dee2e6; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
    h1 { font-size: 20px; margin: 0 0 15px 0; }
    h2 { font-size: 16px; margin: 0 0 10px 0; }
    .stat-row { display: flex; gap: 30px; flex-wrap: wrap; font-size: 14px; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-label { font-size: 11px; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 18px; font-weight: bold; color: #212529; }
    .loading { color: #6c757d; font-style: italic; padding: 10px 0; }
    .error { color: #dc3545; padding: 10px 0; }
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #343a40; color: #fff; padding: 7px 10px; text-align: right; white-space: nowrap; position: relative; cursor: help; }
    th:first-child { text-align: left; }
    td { border-bottom: 1px solid #dee2e6; padding: 6px 10px; text-align: right; }
    td:first-child { text-align: left; font-weight: bold; }
    tr:hover td { background: #f0f4ff; }
    td.col-key { background: #eff6ff; }
    td.col-key2 { background: #f0fdf4; }
    tr:hover td.col-key { background: #dbeafe; }
    tr:hover td.col-key2 { background: #dcfce7; }
    th.col-key { background: #1e3a5f; }
    th.col-key2 { background: #14532d; }
    .neg { color: #dc3545; }
    .pos { color: #198754; }
    th .tip { display: none; }
    #col-tooltip { position: fixed; background: #212529; color: #fff; padding: 5px 10px;
                   border-radius: 4px; font-size: 12px; z-index: 9999;
                   pointer-events: none; max-width: 280px; white-space: normal; line-height: 1.4; }
    .chart-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; color: #343a40; }
    .chart-meta { font-size: 12px; color: #6c757d; margin-bottom: 6px; }
    .chart-box { width: 100%; height: 260px; }
    .snap-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .snap-btn { padding: 4px 10px; font-size: 12px; border: 1px solid #ced4da; border-radius: 4px; cursor: pointer; background: #fff; }
    .snap-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .snap-btn.pre { border-style: dashed; color: #856404; }
    .snap-btn.pre.active { background: #856404; color: #fff; border-color: #856404; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
    .badge-pre { background: #fff3cd; color: #856404; }
    .action-btn { padding: 6px 14px; font-size: 13px; border: 1px solid #ced4da; border-radius: 4px; cursor: pointer; background: #fff; }
    .action-btn:hover { background: #e9ecef; }
    .action-btn.primary { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .action-btn.primary:hover { background: #0b5ed7; }
    .action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Historical</a>
    <a class="active" href="/live">Live</a>
    <a href="/analysis">Analysis</a>
    <a href="/hscatter">Distribution</a>
    <a href="/spx">SPX Prices</a>
    <a href="/csv">CSV</a>
  </div>

  <h1>Live GEX &mdash; <span id="live-date">Today</span></h1>

  <div class="card" style="padding:10px 15px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="action-btn" onclick="runCapture()">&#128274; Capture Session</button>
      <button class="action-btn primary" onclick="runFetch()">&#8635; Fetch Live Data</button>
      <span id="action-status" style="font-size:13px;color:#6c757d"></span>
    </div>
  </div>

  <div class="card">
    <div class="stat-row" id="live-stats">
      <div class="stat-item"><span class="stat-label">Snapshots</span><span class="stat-value" id="stat-count">--</span></div>
      <div class="stat-item"><span class="stat-label">Latest Time (ET)</span><span class="stat-value" id="stat-time">--</span></div>
      <div class="stat-item"><span class="stat-label">SPX</span><span class="stat-value" id="stat-spx">--</span></div>
      <div class="stat-item"><span class="stat-label">Net GEX</span><span class="stat-value" id="stat-net">--</span></div>
      <div class="stat-item"><span class="stat-label">Wall</span><span class="stat-value" id="stat-wall">--</span></div>
      <div class="stat-item"><span class="stat-label">Flip</span><span class="stat-value" id="stat-flip">--</span></div>
      <div class="stat-item"><span class="stat-label">Regime</span><span class="stat-value" id="stat-regime">--</span></div>
    </div>
  </div>

  <div class="card">
    <h2>Snapshots</h2>
    <div class="tbl-wrap">
      <div id="live-snapshots" class="loading">Loading snapshots...</div>
    </div>
  </div>

  <div class="card" id="charts-card" style="display:none">
    <h2>Charts <span id="chart-time-label" style="font-weight:normal;font-size:13px;color:#6c757d"></span></h2>
    <div class="snap-selector" id="snap-selector"></div>
    <div class="chart-title">Gamma Exposure</div>
    <div class="chart-meta" id="gex-meta"></div>
    <div class="chart-box" id="chart-gex"></div>
    <div class="chart-title" style="margin-top:16px">Open Interest</div>
    <div class="chart-meta" id="oi-meta"></div>
    <div class="chart-box" id="chart-oi"></div>
    <div class="chart-title" style="margin-top:16px">Daily Volume</div>
    <div class="chart-meta" id="vol-meta"></div>
    <div class="chart-box" id="chart-vol"></div>
  </div>

  <script>
    function fmtTime(ntime) {
      const s = String(ntime).padStart(4, '0');
      return s.slice(0, 2) + ':' + s.slice(2);
    }
    function fmtBig(n, suffix) {
      if (n === null || n === undefined) return '--';
      const abs = Math.abs(n);
      const sign = n < 0 ? '-' : '';
      if (suffix === 'B') return sign + (abs / 1e9).toFixed(2) + 'B';
      if (suffix === 'M') return sign + (abs / 1e6).toFixed(2) + 'M';
      if (suffix === 'K') return sign + (abs / 1e3).toFixed(2) + 'K';
      return n.toFixed(2);
    }
    function getSuffixForColumn(snaps, key) {
      let maxAbs = 0;
      for (const s of snaps) {
        const val = s[key];
        if (val !== null && val !== undefined) {
          const abs = Math.abs(val);
          if (abs > maxAbs) maxAbs = abs;
        }
      }
      if (maxAbs >= 1e9) return 'B';
      if (maxAbs >= 1e6) return 'M';
      if (maxAbs >= 1e3) return 'K';
      return '';
    }
    function fmtNum(n, dp) {
      if (n === null || n === undefined) return '--';
      return Number(n).toFixed(dp ?? 0);
    }
    function cls(n) {
      if (n === null || n === undefined) return '';
      return n < 0 ? ' class="neg"' : (n > 0 ? ' class="pos"' : '');
    }

    function buildRow(s, ntime, suffixes) {
      const t = fmtTime(ntime);
      const pre = s.is_premarket ? ' <span class="badge badge-pre">PRE</span>' : '';
      const k = ' class="col-key"';
      const k2 = ' class="col-key2"';
      return '<tr>' +
        '<td>' + t + pre + '</td>' +
        '<td>' + fmtNum(s.uprice, 2) + '</td>' +
        '<td>' + fmtNum(s.sentiment_pct, 1) + '</td>' +
        '<td>' + fmtNum(s.gex_ratio, 1) + '</td>' +
        '<td' + cls(s.net_gex) + '>' + fmtBig(s.net_gex, suffixes.net_gex) + '</td>' +
        '<td>' + fmtNum(s.kcs, 1) + '</td>' +
        '<td>' + (s.hmm_label || '--') + '</td>' +
        '<td' + cls(-s.put_gex) + '>' + fmtBig(s.put_gex, suffixes.put_gex) + '</td>' +
        '<td>' + fmtBig(s.total_call_vol, suffixes.total_call_vol) + '</td>' +
        '<td>' + fmtBig(s.total_put_vol, suffixes.total_put_vol) + '</td>' +
        '<td>' + fmtNum(s.flip, 0) + '</td>' +
        '<td' + k + '>' + (s.key_strike ?? '--') + '</td>' +
        '<td class="col-key"' + cls(s.key_call_gex) + '>' + fmtBig(s.key_call_gex, suffixes.key_call_gex) + '</td>' +
        '<td class="col-key"' + cls(-s.key_put_gex) + '>' + fmtBig(s.key_put_gex, suffixes.key_put_gex) + '</td>' +
        '<td' + k + '>' + fmtBig(s.key_call_oi, suffixes.key_call_oi) + '</td>' +
        '<td' + k + '>' + fmtBig(s.key_put_oi, suffixes.key_put_oi) + '</td>' +
        '<td' + k + '>' + fmtBig(s.key_call_vol, suffixes.key_call_vol) + '</td>' +
        '<td' + k + '>' + fmtBig(s.key_put_vol, suffixes.key_put_vol) + '</td>' +
        '<td' + k2 + '>' + (s.key2_strike ?? '--') + '</td>' +
        '<td' + k2 + '>' + fmtBig(s.key2_abs, suffixes.key2_abs) + '</td>' +
        '<td' + k2 + '>' + fmtBig(s.key2_call_vol, suffixes.key2_call_vol) + '</td>' +
        '<td' + k2 + '>' + fmtBig(s.key2_put_vol, suffixes.key2_put_vol) + '</td>' +
      '</tr>';
    }

    const HEADERS = [
      ['Time (ET)', 'Snapshot time in Eastern Time'],
      ['SPX', 'SPX price at snapshot time'],
      ['Senti%', 'Call/Put sentiment percentage (call GEX dominance)'],
      ['Ratio', 'Call/Put GEX ratio'],
      ['Net GEX', 'Net gamma exposure (call GEX minus put GEX)'],
      ['KCS', 'Key strike concentration score'],
      ['Regime', 'HMM market regime label'],
      ['Put GEX', 'Total put GEX'],
      ['cVol', 'Total call volume'],
      ['pVol', 'Total put volume'],
      ['Flip', 'GEX flip point (price where net GEX crosses zero)'],
      ['Key', 'Key strike (highest absolute GEX)'],
      ['K-cGEX', 'Call GEX at key strike'],
      ['K-pGEX', 'Put GEX at key strike'],
      ['K-cOI', 'Call open interest at key strike'],
      ['K-pOI', 'Put open interest at key strike'],
      ['K-cVol', 'Call volume at key strike'],
      ['K-pVol', 'Put volume at key strike'],
      ['Key2', 'Secondary key strike'],
      ['K2-Abs', 'Absolute GEX at secondary key strike'],
      ['K2-cVol', 'Call volume at secondary key strike'],
      ['K2-pVol', 'Put volume at secondary key strike'],
    ];

    const COL_CLASS = ['','','','','','','','','','','','col-key','col-key','col-key','col-key','col-key','col-key','col-key','col-key2','col-key2','col-key2','col-key2'];

    function buildHeader() {
      return '<thead><tr>' +
        HEADERS.map(([label, tip], i) =>
          '<th class="' + (COL_CLASS[i]||'') + '" data-tip="' + tip + '">' + label + '</th>'
        ).join('') +
        '</tr></thead>';
    }

    let snapData = {};  // cache: ntime -> snapshot response

    function renderCharts(snapTime) {
      const d = snapData[snapTime];
      if (!d) return;
      const s = d.summary || {};
      const uprice = s.uprice || 0;
      const strikes = d.strikes || [];
      const cg = d.call_gex || [];
      const pg = d.put_gex || [];
      const net = d.net_gex || [];
      const coi = d.call_oi || [];
      const poi = d.put_oi || [];
      const cvol = d.call_vol || [];
      const pvol = d.put_vol || [];

      const spxLine = { type: 'line', x0: uprice, x1: uprice, y0: 0, y1: 1, yref: 'paper', line: { color: '#212529', width: 1.5, dash: 'dash' } };
      const layout_base = {
        margin: { t: 10, l: 65, r: 20, b: 40 },
        plot_bgcolor: '#fff', paper_bgcolor: '#fff',
        xaxis: { tickfont: { size: 10 } },
        shapes: [spxLine],
        showlegend: true,
        legend: { orientation: 'h', y: 1.12, x: 0 },
        barmode: 'relative',
      };

      // GEX chart — with key strike highlight
      const keyStrike = s.key_strike;
      const gexShapes = [spxLine];
      if (keyStrike != null && strikes.includes(keyStrike)) {
        const idx = strikes.indexOf(keyStrike);
        const barW = strikes.length > 1 ? Math.abs(strikes[1] - strikes[0]) * 0.5 : 5;
        const keyY = Math.max(Math.abs(cg[idx] || 0), Math.abs(pg[idx] || 0));
        gexShapes.push({
          type: 'rect',
          x0: keyStrike - barW, x1: keyStrike + barW,
          y0: -(keyY * 1.15), y1: keyY * 1.15,
          line: { color: '#0d6efd', width: 2, dash: 'dot' },
          fillcolor: 'rgba(13,110,253,0.05)',
        });
      }
      const totalCg = cg.reduce((a,b) => a+b, 0);
      const totalPg = Math.abs(pg.reduce((a,b) => a+b, 0));
      document.getElementById('gex-meta').textContent =
        'Sentiment: ' + (s.sentiment_pct ?? '--') + '%  Ratio: ' + (s.gex_ratio ?? '--') + '  Net: ' + fmtBig(s.net_gex) + (keyStrike ? '  Key: ' + keyStrike : '');
      Plotly.react('chart-gex', [
        { name: 'Call GEX', x: strikes, y: cg, type: 'bar', marker: { color: '#198754' }, yaxis: 'y' },
        { name: 'Put GEX',  x: strikes, y: pg, type: 'bar', marker: { color: '#dc3545' }, yaxis: 'y' },
      ], { ...layout_base, shapes: gexShapes, yaxis: { title: 'GEX ($)', tickformat: '.2s' } }, { responsive: true });

      // OI chart
      const totalCoi = coi.reduce((a,b) => a+b, 0);
      const totalPoi = Math.abs(poi.reduce((a,b) => a+b, 0));
      document.getElementById('oi-meta').textContent =
        'Puts: ' + fmtBig(totalPoi) + '  Calls: ' + fmtBig(totalCoi);
      Plotly.react('chart-oi', [
        { name: 'Call OI', x: strikes, y: coi, type: 'bar', marker: { color: '#198754' } },
        { name: 'Put OI',  x: strikes, y: poi, type: 'bar', marker: { color: '#dc3545' } },
      ], { ...layout_base, yaxis: { title: 'Open Interest', tickformat: '.2s' } }, { responsive: true });

      // Vol chart
      const totalCvol = cvol.reduce((a,b) => a+b, 0);
      const totalPvol = Math.abs(pvol.reduce((a,b) => a+b, 0));
      document.getElementById('vol-meta').textContent =
        'Puts: ' + fmtBig(totalPvol) + '  Calls: ' + fmtBig(totalCvol);
      Plotly.react('chart-vol', [
        { name: 'Call Vol', x: strikes, y: cvol, type: 'bar', marker: { color: '#198754' } },
        { name: 'Put Vol',  x: strikes, y: pvol, type: 'bar', marker: { color: '#dc3545' } },
      ], { ...layout_base, yaxis: { title: 'Volume', tickformat: '.2s' } }, { responsive: true });

      // Selector highlight
      document.querySelectorAll('.snap-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.time) === snapTime);
      });
      const preNote = s.is_premarket ? ' <span style="font-size:11px;color:#856404;background:#fff3cd;padding:2px 6px;border-radius:4px">PRE-MARKET — HMM excluded</span>' : '';
      document.getElementById('chart-time-label').textContent = '';
      document.getElementById('chart-time-label').innerHTML = '&mdash; ' + fmtTime(snapTime) + preNote;
    }

    async function loadLive() {
      try {
        const r = await fetch('/api/live/snapshots');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();

        document.getElementById('live-date').textContent = d.date || 'Today';
        document.getElementById('stat-count').textContent = d.times.length;

        if (!d.times.length) {
          document.getElementById('live-snapshots').innerHTML = '<p>No live snapshots today.</p>';
          return;
        }

        // Fetch all snapshots newest first
        const sorted = [...d.times].sort((a, b) => b - a);
        const snaps = await Promise.all(
          sorted.map(t => fetch('/api/live/snapshot?time=' + t).then(r => r.json()))
        );

        // Populate header stats from latest
        const latest = snaps[0];
        const ls = latest.summary || {};
        const summaries = snaps.map(s => s.summary || {});
        document.getElementById('stat-time').textContent = fmtTime(sorted[0]);
        document.getElementById('stat-spx').textContent = fmtNum(ls.uprice, 2);
        document.getElementById('stat-wall').textContent = ls.wall ?? '--';
        document.getElementById('stat-flip').textContent = fmtNum(ls.flip, 0);
        document.getElementById('stat-regime').textContent = ls.hmm_label || '--';

        // Calculate suffixes for each column based on max value
        const suffixes = {
          net_gex: getSuffixForColumn(summaries, 'net_gex'),
          put_gex: getSuffixForColumn(summaries, 'put_gex'),
          total_call_vol: getSuffixForColumn(summaries, 'total_call_vol'),
          total_put_vol: getSuffixForColumn(summaries, 'total_put_vol'),
          key_call_gex: getSuffixForColumn(summaries, 'key_call_gex'),
          key_put_gex: getSuffixForColumn(summaries, 'key_put_gex'),
          key_call_oi: getSuffixForColumn(summaries, 'key_call_oi'),
          key_put_oi: getSuffixForColumn(summaries, 'key_put_oi'),
          key_call_vol: getSuffixForColumn(summaries, 'key_call_vol'),
          key_put_vol: getSuffixForColumn(summaries, 'key_put_vol'),
          key2_abs: getSuffixForColumn(summaries, 'key2_abs'),
          key2_call_vol: getSuffixForColumn(summaries, 'key2_call_vol'),
          key2_put_vol: getSuffixForColumn(summaries, 'key2_put_vol'),
        };

        document.getElementById('stat-net').textContent = fmtBig(ls.net_gex, suffixes.net_gex);

        // Build table
        const rows = snaps.map((snap, i) => buildRow(snap.summary || {}, sorted[i], suffixes)).join('');
        document.getElementById('live-snapshots').innerHTML =
          '<table>' + buildHeader() + '<tbody>' + rows + '</tbody></table>';

        // Cache snapshot data and build chart selector
        snaps.forEach((snap, i) => { snapData[sorted[i]] = snap; });
        const selector = document.getElementById('snap-selector');
        selector.innerHTML = sorted.map(t => {
          const isPre = snapData[t] && snapData[t].is_premarket;
          const cls = isPre ? 'snap-btn pre' : 'snap-btn';
          const label = fmtTime(t) + (isPre ? ' PRE' : '');
          return '<button class="' + cls + '" data-time="' + t + '" onclick="renderCharts(' + t + ')">' + label + '</button>';
        }).join('');
        document.getElementById('charts-card').style.display = 'block';
        renderCharts(sorted[0]);

      } catch (e) {
        document.getElementById('live-snapshots').innerHTML =
          '<p class="error">Error loading data: ' + e.message + '</p>';
        console.error(e);
      }
    }

    async function runCapture() {
      const btn = event.target;
      const status = document.getElementById('action-status');
      btn.disabled = true;
      status.textContent = 'Refreshing session...';
      status.style.color = '#6c757d';
      try {
        const r = await fetch('/api/live/capture');
        const d = await r.json();
        status.textContent = d.ok ? '\u2713 Session refreshed' : '\u2717 ' + (d.error || 'Failed');
        status.style.color = d.ok ? '#198754' : '#dc3545';
      } catch (e) {
        status.textContent = '\u2717 ' + e.message;
        status.style.color = '#dc3545';
      }
      btn.disabled = false;
    }

    async function runFetch() {
      const btn = event.target;
      const status = document.getElementById('action-status');
      btn.disabled = true;
      status.textContent = 'Fetching live GEX data... (may take 30s)';
      status.style.color = '#6c757d';
      try {
        const r = await fetch('/api/live/fetch');
        const d = await r.json();
        if (d.error) {
          status.textContent = '\u2717 ' + d.error;
          status.style.color = '#dc3545';
        } else {
          status.textContent = '\u2713 Fetched \u2014 reloading...';
          status.style.color = '#198754';
          setTimeout(() => { snapData = {}; loadLive(); status.textContent = ''; }, 1500);
        }
      } catch (e) {
        status.textContent = '\u2717 ' + e.message;
        status.style.color = '#dc3545';
      }
      btn.disabled = false;
    }

    // Floating column tooltip
    const _tt = document.createElement('div');
    _tt.id = 'col-tooltip';
    _tt.style.display = 'none';
    document.body.appendChild(_tt);
    document.addEventListener('mouseover', e => {
      const th = e.target.closest('th[data-tip]');
      if (th) { _tt.textContent = th.dataset.tip; _tt.style.display = 'block'; }
    });
    document.addEventListener('mousemove', e => {
      if (_tt.style.display === 'block') {
        _tt.style.left = (e.clientX + 12) + 'px';
        _tt.style.top  = (e.clientY - 28) + 'px';
      }
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest('th[data-tip]')) _tt.style.display = 'none';
    });

    loadLive();
  </script>
</body>
</html>
