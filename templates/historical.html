<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historical GEX</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f8f9fa; }
    .nav { background: #212529; padding: 10px 20px; margin: -20px -20px 20px -20px; display: flex; gap: 5px; }
    .nav a { padding: 6px 14px; text-decoration: none; color: #adb5bd; border-radius: 4px; font-size: 14px; }
    .nav a:hover { background: #343a40; color: #fff; }
    .nav a.active { background: #0d6efd; color: #fff; }
    .card { background: #fff; border: 1px solid #dee2e6; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
    h1 { font-size: 20px; margin: 0 0 15px 0; }
    h2 { font-size: 16px; margin: 0 0 10px 0; }
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .toolbar label { font-size: 13px; font-weight: bold; }
    .toolbar select { padding: 5px 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; }
    .toolbar button { padding: 5px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; background: #fff; cursor: pointer; }
    .toolbar button:hover { background: #e9ecef; }
    .stat-row { display: flex; gap: 30px; flex-wrap: wrap; font-size: 14px; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-label { font-size: 11px; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 18px; font-weight: bold; color: #212529; }
    .loading { color: #6c757d; font-style: italic; padding: 10px 0; }
    .error { color: #dc3545; padding: 10px 0; }
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #343a40; color: #fff; padding: 7px 10px; text-align: right; white-space: nowrap; position: relative; cursor: help; }
    th:first-child { text-align: left; }
    td { border-bottom: 1px solid #dee2e6; padding: 6px 10px; text-align: right; }
    td:first-child { text-align: left; font-weight: bold; }
    tr:hover td { background: #f0f4ff; }
    td.col-key { background: #eff6ff; }
    td.col-key2 { background: #f0fdf4; }
    tr:hover td.col-key { background: #dbeafe; }
    tr:hover td.col-key2 { background: #dcfce7; }
    th.col-key { background: #1e3a5f; }
    th.col-key2 { background: #14532d; }
    .hmm-pos { color: #198754; font-weight: bold; }
    .hmm-neg { color: #dc3545; font-weight: bold; }
    .hmm-vol { color: #d97706; font-weight: bold; }
    .hmm-neu { color: #6c757d; font-weight: bold; }
    .pct-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
    .pct-item { display: flex; flex-direction: column; min-width: 90px; }
    .pct-label { font-size: 10px; color: #6c757d; text-transform: uppercase; margin-bottom: 2px; }
    .pct-bar-wrap { background: #e9ecef; border-radius: 3px; height: 8px; width: 100%; }
    .pct-bar { height: 8px; border-radius: 3px; background: #0d6efd; }
    .pct-val { font-size: 11px; font-weight: bold; margin-top: 2px; }
    .neg { color: #dc3545; }
    .pos { color: #198754; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
    .badge-pre { background: #fff3cd; color: #856404; }
    th .tip { display: none; }
    #col-tooltip { position: fixed; background: #212529; color: #fff; padding: 5px 10px;
                   border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 9999;
                   pointer-events: none; max-width: 280px; white-space: normal; line-height: 1.4; }
    .chart-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; color: #343a40; }
    .chart-meta { font-size: 12px; color: #6c757d; margin-bottom: 6px; }
    .chart-box { width: 100%; height: 260px; }
    .snap-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .snap-btn { padding: 4px 10px; font-size: 12px; border: 1px solid #ced4da; border-radius: 4px; cursor: pointer; background: #fff; }
    .snap-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .action-btn { padding: 5px 12px; font-size: 13px; border: 1px solid #ced4da; border-radius: 4px; cursor: pointer; background: #fff; }
    .action-btn:hover { background: #e9ecef; }
    .action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="nav">
    <a class="active" href="/">Historical</a>
    <a href="/live">Live</a>
    <a href="/analysis">Analysis</a>
    <a href="/hscatter">Distribution</a>
    <a href="/spx">SPX Prices</a>
    <a href="/csv">CSV</a>
  </div>

  <h1>Historical GEX</h1>

  <div class="card">
    <div class="toolbar">
      <label>Date:</label>
      <select id="date-sel" onchange="loadDate()"></select>
      <button onclick="prevDay()">&#8592; Prev</button>
      <button onclick="nextDay()">Next &#8594;</button>
      <button class="action-btn" onclick="syncHistorical()">&#8635; Load Missing Historical</button>
      <span id="sync-status" style="font-size:13px;color:#6c757d"></span>
    </div>
    <div class="stat-row" id="hist-stats">
      <div class="stat-item"><span class="stat-label">Snapshots</span><span class="stat-value" id="stat-count">--</span></div>
      <div class="stat-item"><span class="stat-label">First Time (ET)</span><span class="stat-value" id="stat-first">--</span></div>
      <div class="stat-item"><span class="stat-label">Last Time (ET)</span><span class="stat-value" id="stat-last">--</span></div>
      <div class="stat-item"><span class="stat-label">SPX (last)</span><span class="stat-value" id="stat-spx">--</span></div>
      <div class="stat-item"><span class="stat-label">Net GEX (last)</span><span class="stat-value" id="stat-net">--</span></div>
      <div class="stat-item"><span class="stat-label">Wall (last)</span><span class="stat-value" id="stat-wall">--</span></div>
      <div class="stat-item"><span class="stat-label">Regime (last)</span><span class="stat-value" id="stat-regime">--</span></div>
    </div>
  </div>

  <div class="card">
    <h2>Snapshots</h2>
    <div class="tbl-wrap">
      <div id="hist-snapshots" class="loading">Select a date to load snapshots...</div>
    </div>
  </div>

  <div class="card" id="charts-card" style="display:none">
    <h2>Charts <span id="chart-time-label" style="font-weight:normal;font-size:13px;color:#6c757d"></span></h2>
    <div class="snap-selector" id="snap-selector"></div>
    <div class="pct-grid" id="pct-grid"></div>
    <div class="chart-title">Gamma Exposure</div>
    <div class="chart-meta" id="gex-meta"></div>
    <div class="chart-box" id="chart-gex"></div>
    <div class="chart-title" style="margin-top:16px">Open Interest</div>
    <div class="chart-meta" id="oi-meta"></div>
    <div class="chart-box" id="chart-oi"></div>
    <div class="chart-title" style="margin-top:16px">Daily Volume</div>
    <div class="chart-meta" id="vol-meta"></div>
    <div class="chart-box" id="chart-vol"></div>
  </div>

  <script>
    let dates = [];

    function fmtTime(ntime) {
      const s = String(ntime).padStart(4, '0');
      return s.slice(0, 2) + ':' + s.slice(2);
    }
    function fmtBig(n) {
      if (n === null || n === undefined) return '--';
      const abs = Math.abs(n);
      const sign = n < 0 ? '-' : '';
      if (abs >= 1e9) return sign + (abs / 1e9).toFixed(2) + 'B';
      if (abs >= 1e6) return sign + (abs / 1e6).toFixed(2) + 'M';
      if (abs >= 1e3) return sign + (abs / 1e3).toFixed(2) + 'K';
      return n.toFixed(2);
    }
    function fmtNum(n, dp) {
      if (n === null || n === undefined) return '--';
      return Number(n).toFixed(dp ?? 0);
    }
    function cls(n) {
      if (n === null || n === undefined) return '';
      return n < 0 ? ' class="neg"' : (n > 0 ? ' class="pos"' : '');
    }

    const HEADERS = [
      ['Time (ET)', 'Snapshot time in Eastern Time'],
      ['SPX', 'SPX price at snapshot time'],
      ['Senti%', 'Call/Put sentiment percentage (call GEX dominance)'],
      ['Ratio', 'Call/Put GEX ratio'],
      ['Net GEX', 'Net gamma exposure (call GEX minus put GEX)'],
      ['KCS', 'Key strike concentration score'],
      ['Regime', 'HMM market regime label'],
      ['Put GEX', 'Total put GEX'],
      ['cVol', 'Total call volume'],
      ['pVol', 'Total put volume'],
      ['Flip', 'GEX flip point (price where net GEX crosses zero)'],
      ['Key', 'Key strike (highest absolute GEX)'],
      ['K-cGEX', 'Call GEX at key strike'],
      ['K-pGEX', 'Put GEX at key strike'],
      ['K-cOI', 'Call open interest at key strike'],
      ['K-pOI', 'Put open interest at key strike'],
      ['K-cVol', 'Call volume at key strike'],
      ['K-pVol', 'Put volume at key strike'],
      ['Key2', 'Secondary key strike'],
      ['K2-Abs', 'Absolute GEX at secondary key strike'],
      ['K2-cVol', 'Call volume at secondary key strike'],
      ['K2-pVol', 'Put volume at secondary key strike'],
    ];

    // Col indices: 0-10 = base, 11-17 = key, 18-21 = key2
    const COL_CLASS = ['','','','','','','','','','','','col-key','col-key','col-key','col-key','col-key','col-key','col-key','col-key2','col-key2','col-key2','col-key2'];

    function buildHeader() {
      return '<thead><tr>' +
        HEADERS.map(([label, tip], i) =>
          '<th class="' + (COL_CLASS[i]||'') + '" data-tip="' + tip + '">' + label + '</th>'
        ).join('') +
        '</tr></thead>';
    }

    function hmmCls(label) {
      if (!label) return '';
      const l = label.toLowerCase();
      if (l.includes('positive')) return 'hmm-pos';
      if (l.includes('negative')) return 'hmm-neg';
      if (l.includes('volatile')) return 'hmm-vol';
      return 'hmm-neu';
    }

    function buildRow(row) {
      const pre = row.is_premarket ? ' <span class="badge badge-pre">PRE</span>' : '';
      const k = ' class="col-key"';
      const k2 = ' class="col-key2"';
      const hc = hmmCls(row.hmm_label);
      return '<tr>' +
        '<td>' + fmtTime(row.ntime) + pre + '</td>' +
        '<td>' + fmtNum(row.spx_last, 2) + '</td>' +
        '<td>' + fmtNum(row.sentiment, 1) + '</td>' +
        '<td>' + fmtNum(row.gex_ratio, 1) + '</td>' +
        '<td' + cls(row.net_gex) + '>' + fmtBig(row.net_gex) + '</td>' +
        '<td>' + fmtNum(row.kcs, 1) + '</td>' +
        '<td><span class="' + hc + '">' + (row.hmm_label || '--') + '</span></td>' +
        '<td' + cls(-(row.total_put_gex || 0)) + '>' + fmtBig(row.total_put_gex) + '</td>' +
        '<td>' + fmtBig(row.total_call_vol) + '</td>' +
        '<td>' + fmtBig(row.total_put_vol) + '</td>' +
        '<td>' + fmtNum(row.flip, 0) + '</td>' +
        '<td' + k + '>' + (row.key_strike ?? '--') + '</td>' +
        '<td class="col-key"' + cls(row.key_call_gex) + '>' + fmtBig(row.key_call_gex) + '</td>' +
        '<td class="col-key"' + cls(-(row.key_put_gex || 0)) + '>' + fmtBig(row.key_put_gex) + '</td>' +
        '<td' + k + '>' + fmtBig(row.key_call_oi) + '</td>' +
        '<td' + k + '>' + fmtBig(row.key_put_oi) + '</td>' +
        '<td' + k + '>' + fmtBig(row.key_call_vol) + '</td>' +
        '<td' + k + '>' + fmtBig(row.key_put_vol) + '</td>' +
        '<td' + k2 + '>' + (row.key2_strike ?? '--') + '</td>' +
        '<td' + k2 + '>' + fmtBig(row.key2_abs) + '</td>' +
        '<td' + k2 + '>' + fmtBig(row.key2_call_vol) + '</td>' +
        '<td' + k2 + '>' + fmtBig(row.key2_put_vol) + '</td>' +
      '</tr>';
    }

    async function loadDate() {
      const date = document.getElementById('date-sel').value;
      if (!date) return;
      delete snapCache[date];  // always re-fetch on date load
      document.getElementById('hist-snapshots').innerHTML = '<span class="loading">Loading...</span>';
      try {
        const r = await fetch('/api/snapshots/summary?date=' + date);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        const rows = d.rows || [];

        document.getElementById('stat-count').textContent = rows.length;

        if (!rows.length) {
          document.getElementById('hist-snapshots').innerHTML = '<p>No snapshots for this date.</p>';
          ['stat-first','stat-last','stat-spx','stat-net','stat-wall','stat-regime'].forEach(id => document.getElementById(id).textContent = '--');
          return;
        }

        // rows are newest-first from API; first = latest, last = earliest
        const latest = rows[0];
        const earliest = rows[rows.length - 1];
        document.getElementById('stat-first').textContent = fmtTime(earliest.ntime);
        document.getElementById('stat-last').textContent = fmtTime(latest.ntime);
        document.getElementById('stat-spx').textContent = fmtNum(latest.spx_last, 2);
        document.getElementById('stat-net').textContent = fmtBig(latest.net_gex);
        document.getElementById('stat-wall').textContent = latest.key_strike ?? '--';
        document.getElementById('stat-regime').textContent = latest.hmm_label || '--';

        const tableRows = rows.map(buildRow).join('');
        document.getElementById('hist-snapshots').innerHTML =
          '<table>' + buildHeader() + '<tbody>' + tableRows + '</tbody></table>';

        // Fetch and cache all snapshot details for charts, then render selector
        const ntimes = rows.map(r => r.ntime);
        if (!snapCache[date]) snapCache[date] = {};
        const snapFetches = ntimes.map(t =>
          (snapCache[date][t]
            ? Promise.resolve(snapCache[date][t])
            : fetch('/api/snapshot?date=' + date + '&time=' + t).then(r => r.json()).then(sd => { snapCache[date][t] = sd; return sd; })
          )
        );
        Promise.all(snapFetches).then(() => {
          const rthTimes = ntimes.filter(t => t >= 930);
          const displayTimes = rthTimes.length ? rthTimes : ntimes;
          document.getElementById('snap-selector').innerHTML = displayTimes.map(t =>
            '<button class="snap-btn" data-time="' + t + '" onclick="renderCharts(' + t + ')">' + fmtTime(t) + '</button>'
          ).join('');
          document.getElementById('charts-card').style.display = 'block';
          if (displayTimes.length) renderCharts(displayTimes[0]);
        });
      } catch (e) {
        document.getElementById('hist-snapshots').innerHTML = '<p class="error">Error: ' + e.message + '</p>';
        console.error(e);
      }
    }

    function prevDay() {
      const sel = document.getElementById('date-sel');
      if (sel.selectedIndex < sel.options.length - 1) {
        sel.selectedIndex++;
        loadDate();
      }
    }

    function nextDay() {
      const sel = document.getElementById('date-sel');
      if (sel.selectedIndex > 0) {
        sel.selectedIndex--;
        loadDate();
      }
    }

    let snapCache = {};  // date -> { ntime -> snapshot }

    function renderCharts(ntime) {
      const date = document.getElementById('date-sel').value;
      const d = (snapCache[date] || {})[ntime];
      if (!d) return;
      const s = d.summary || {};
      const uprice = s.uprice || 0;
      const strikes = d.strikes || [];
      const cg = d.call_gex || [];
      const pg = d.put_gex || [];
      const coi = d.call_oi || [];
      const poi = d.put_oi || [];
      const cvol = d.call_vol || [];
      const pvol = d.put_vol || [];

      const spxLine = { type: 'line', x0: uprice, x1: uprice, y0: 0, y1: 1, yref: 'paper', line: { color: '#212529', width: 1.5, dash: 'dash' } };
      const layout_base = {
        margin: { t: 10, l: 65, r: 20, b: 40 },
        plot_bgcolor: '#fff', paper_bgcolor: '#fff',
        xaxis: { tickfont: { size: 10 } },
        shapes: [spxLine], showlegend: true,
        legend: { orientation: 'h', y: 1.12, x: 0 },
        barmode: 'relative',
      };

      // GEX chart — with key strike highlight
      const keyStrike = s.key_strike;
      const gexShapes = [spxLine];
      if (keyStrike != null && strikes.includes(keyStrike)) {
        const idx = strikes.indexOf(keyStrike);
        const barW = strikes.length > 1 ? Math.abs(strikes[1] - strikes[0]) * 0.5 : 5;
        const keyY = Math.max(Math.abs(cg[idx] || 0), Math.abs(pg[idx] || 0));
        gexShapes.push({
          type: 'rect',
          x0: keyStrike - barW, x1: keyStrike + barW,
          y0: -(keyY * 1.15), y1: keyY * 1.15,
          line: { color: '#0d6efd', width: 2, dash: 'dot' },
          fillcolor: 'rgba(13,110,253,0.05)',
        });
      }
      document.getElementById('gex-meta').textContent =
        'Sentiment: ' + (s.sentiment_pct ?? '--') + '%  Ratio: ' + (s.gex_ratio ?? '--') + '  Net: ' + fmtBig(s.net_gex) + (keyStrike ? '  Key: ' + keyStrike : '');
      Plotly.react('chart-gex', [
        { name: 'Call GEX', x: strikes, y: cg, type: 'bar', marker: { color: '#198754' } },
        { name: 'Put GEX',  x: strikes, y: pg, type: 'bar', marker: { color: '#dc3545' } },
      ], { ...layout_base, shapes: gexShapes, yaxis: { title: 'GEX ($)', tickformat: '.2s' } }, { responsive: true });

      const totalCoi = coi.reduce((a,b) => a+b, 0);
      const totalPoi = Math.abs(poi.reduce((a,b) => a+b, 0));
      document.getElementById('oi-meta').textContent = 'Puts: ' + fmtBig(totalPoi) + '  Calls: ' + fmtBig(totalCoi);
      Plotly.react('chart-oi', [
        { name: 'Call OI', x: strikes, y: coi, type: 'bar', marker: { color: '#198754' } },
        { name: 'Put OI',  x: strikes, y: poi, type: 'bar', marker: { color: '#dc3545' } },
      ], { ...layout_base, yaxis: { title: 'Open Interest', tickformat: '.2s' } }, { responsive: true });

      const totalCvol = cvol.reduce((a,b) => a+b, 0);
      const totalPvol = Math.abs(pvol.reduce((a,b) => a+b, 0));
      document.getElementById('vol-meta').textContent = 'Puts: ' + fmtBig(totalPvol) + '  Calls: ' + fmtBig(totalCvol);
      Plotly.react('chart-vol', [
        { name: 'Call Vol', x: strikes, y: cvol, type: 'bar', marker: { color: '#198754' } },
        { name: 'Put Vol',  x: strikes, y: pvol, type: 'bar', marker: { color: '#dc3545' } },
      ], { ...layout_base, yaxis: { title: 'Volume', tickformat: '.2s' } }, { responsive: true });

      document.querySelectorAll('.snap-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.time) === ntime);
      });
      document.getElementById('chart-time-label').textContent = '\u2014 ' + fmtTime(ntime);

      // Fetch and render percentiles
      const selDate = document.getElementById('date-sel').value;
      fetch('/api/percentiles?date=' + selDate + '&time=' + ntime)
        .then(r => r.json()).then(p => {
          const metrics = [
            ['Net GEX', p.net_gex], ['KCS', p.kcs], ['Dominance', p.dominance],
            ['Call GEX', p.call_gex], ['Put GEX', p.put_gex],
            ['Call Vol', p.call_vol], ['Put Vol', p.put_vol],
          ];
          document.getElementById('pct-grid').innerHTML = metrics.map(([label, m]) => {
            if (!m) return '';
            const pct = m.pct ?? 50;
            const barColor = pct >= 75 ? '#dc3545' : pct >= 50 ? '#fd7e14' : '#198754';
            return '<div class="pct-item">' +
              '<div class="pct-label">' + label + '</div>' +
              '<div class="pct-bar-wrap"><div class="pct-bar" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
              '<div class="pct-val">' + pct + 'th pct</div>' +
            '</div>';
          }).join('');
        }).catch(() => { document.getElementById('pct-grid').innerHTML = ''; });
    }

    async function syncHistorical() {
      const btn = event.target;
      const status = document.getElementById('sync-status');
      btn.disabled = true;
      status.textContent = 'Syncing... (may take a minute)';
      status.style.color = '#6c757d';
      try {
        const r = await fetch('/api/sync-historical?max_days=30');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        const added = d.fetched ?? d.added ?? d.synced ?? '?';
        const skipped = d.skipped ?? '';
        status.textContent = '\u2713 Done — ' + added + ' added' + (skipped ? ', ' + skipped + ' skipped' : '') + '. Reloading dates...';
        status.style.color = '#198754';
        // Reload date list to pick up new dates
        await reloadDates();
        setTimeout(() => { status.textContent = ''; }, 4000);
      } catch (e) {
        status.textContent = '\u2717 ' + e.message;
        status.style.color = '#dc3545';
      }
      btn.disabled = false;
    }

    async function reloadDates() {
      const r = await fetch('/api/dates');
      dates = await r.json();
      const sel = document.getElementById('date-sel');
      const current = sel.value;
      sel.innerHTML = '';
      [...dates].reverse().forEach(d => {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        sel.appendChild(o);
      });
      if (current) sel.value = current;
    }

    // Floating column tooltip
    const _tt = document.createElement('div');
    _tt.id = 'col-tooltip';
    _tt.style.display = 'none';
    document.body.appendChild(_tt);
    document.addEventListener('mouseover', e => {
      const th = e.target.closest('th[data-tip]');
      if (th) {
        _tt.textContent = th.dataset.tip;
        _tt.style.display = 'block';
      }
    });
    document.addEventListener('mousemove', e => {
      if (_tt.style.display === 'block') {
        _tt.style.left = (e.clientX + 12) + 'px';
        _tt.style.top  = (e.clientY - 28) + 'px';
      }
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest('th[data-tip]')) _tt.style.display = 'none';
    });

    async function init() {
      const r = await fetch('/api/dates');
      dates = await r.json();
      const sel = document.getElementById('date-sel');
      // dates is oldest-first; reverse for newest-first in dropdown
      [...dates].reverse().forEach(d => {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        sel.appendChild(o);
      });
      if (dates.length) loadDate();
    }

    init();
  </script>
</body>
</html>
