<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History Scatter</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f8f9fa; }
    .nav { background: #212529; padding: 10px 20px; margin: -20px -20px 20px -20px; display: flex; gap: 5px; }
    .nav a { padding: 6px 14px; text-decoration: none; color: #adb5bd; border-radius: 4px; font-size: 14px; }
    .nav a:hover { background: #343a40; color: #fff; }
    .nav a.active { background: #0d6efd; color: #fff; }
    .card { background: #fff; border: 1px solid #dee2e6; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
    h1 { font-size: 20px; margin: 0 0 15px 0; }
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 5px; }
    .toolbar label { font-size: 13px; font-weight: bold; }
    .toolbar select { padding: 5px 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; }
    .loading { color: #6c757d; font-style: italic; }
    .error { color: #dc3545; }
    #scatter-chart { width: 100%; height: 480px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Historical</a>
    <a href="/live">Live</a>
    <a href="/analysis">Analysis</a>
    <a class="active" href="/hscatter">Distribution</a>
    <a href="/spx">SPX Prices</a>
    <a href="/csv">CSV</a>
  </div>

  <h1>Distribution</h1>

  <div class="card">
    <div class="toolbar">
      <label>Time slot:</label>
      <select id="time-sel" onchange="loadDistribution()">
        <option value="930">09:30</option>
        <option value="1000">10:00</option>
        <option value="1030">10:30</option>
        <option value="1100">11:00</option>
        <option value="1130">11:30</option>
        <option value="1200">12:00</option>
        <option value="1230">12:30</option>
        <option value="1300">13:00</option>
        <option value="1330">13:30</option>
        <option value="1400">14:00</option>
        <option value="1430">14:30</option>
        <option value="1500">15:00</option>
        <option value="1530">15:30</option>
      </select>
      <label>Metric:</label>
      <select id="metric-sel" onchange="loadDistribution()">
        <option value="net_gex">Net GEX</option>
        <option value="total_call_gex">Total Call GEX</option>
        <option value="total_put_gex">Total Put GEX</option>
        <option value="kcs">KCS</option>
        <option value="dominance">Dominance</option>
        <option value="sentiment">Sentiment</option>
        <option value="gex_ratio">GEX Ratio</option>
        <option value="total_call_oi">Total Call OI</option>
        <option value="total_put_oi">Total Put OI</option>
        <option value="total_call_vol">Total Call Vol</option>
        <option value="total_put_vol">Total Put Vol</option>
      </select>
      <label>Current snapshot:</label>
      <input type="checkbox" id="use-latest" checked onchange="toggleCustomSnapshot()"> Use latest
      <span id="custom-snapshot" style="display:none">
        <select id="current-date-sel" onchange="loadDistribution()"></select>
        <select id="current-time-sel" onchange="loadDistribution()"></select>
      </span>
    </div>
    <p id="status" class="loading">Loading...</p>
    <div id="dist-chart"></div>
  </div>

  <script>
    let distData = null;
    let availableDates = [];
    let availableTimes = {};

    function toggleCustomSnapshot() {
      const useLatest = document.getElementById('use-latest').checked;
      const customSpan = document.getElementById('custom-snapshot');
      customSpan.style.display = useLatest ? 'none' : 'inline';
      if (!useLatest && availableDates.length === 0) {
        loadAvailableDatesAndTimes();
      }
      loadDistribution();
    }

    async function loadAvailableDatesAndTimes() {
      try {
        const r = await fetch('/api/dates');
        availableDates = await r.json();
        const dateSel = document.getElementById('current-date-sel');
        dateSel.innerHTML = '';
        [...availableDates].reverse().forEach(d => {
          const o = document.createElement('option');
          o.value = d; o.textContent = d;
          dateSel.appendChild(o);
        });
        if (availableDates.length) loadTimesForDate(availableDates[availableDates.length - 1]);
      } catch (e) {
        console.error('Failed to load dates:', e);
      }
    }

    async function loadTimesForDate(date) {
      try {
        const r = await fetch(`/api/snapshots/summary?date=${date}`);
        const d = await r.json();
        const times = (d.rows || []).map(r => r.ntime).sort((a, b) => a - b);
        availableTimes[date] = times;
        const timeSel = document.getElementById('current-time-sel');
        timeSel.innerHTML = '';
        times.forEach(t => {
          const o = document.createElement('option');
          o.value = t;
          const h = Math.floor(t / 100);
          const m = t % 100;
          o.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
          timeSel.appendChild(o);
        });
      } catch (e) {
        console.error('Failed to load times:', e);
      }
    }

    function getUnit(metric) {
      if (metric.includes('gex') && !metric.includes('ratio')) return 'B';
      if (metric.includes('oi')) return 'K';
      return '';
    }

    function renderDistribution() {
      if (!distData) return;
      const d = distData;
      const metric = d.metric.replace(/_/g, ' ').toUpperCase();
      const unit = getUnit(d.metric);

      const histTrace = {
        x: d.values,
        type: 'histogram',
        name: 'Historical',
        marker: { color: '#0d6efd', opacity: 0.6, line: { color: '#0d6efd', width: 1 } },
        xbins: { size: 'auto' },
      };

      const shapes = [];
      if (d.current_value !== null) {
        shapes.push({
          type: 'line',
          x0: d.current_value,
          x1: d.current_value,
          y0: 0,
          y1: 1,
          yref: 'paper',
          line: { color: '#dc3545', width: 3, dash: 'dash' },
        });
      }

      const title = d.current_label
        ? `${metric} Distribution (${d.current_label}: ${d.current_value}${unit}, Percentile: ${d.percentile}%)`
        : `${metric} Distribution (Current: ${d.current_value}${unit}, Percentile: ${d.percentile}%)`;

      const layout = {
        title: title,
        xaxis: { title: `${metric} (${unit})`, zeroline: true, zerolinecolor: '#ccc', zerolinewidth: 1 },
        yaxis: { title: 'Count' },
        margin: { t: 50, l: 60, r: 20, b: 50 },
        plot_bgcolor: '#fff',
        paper_bgcolor: '#fff',
        bargap: 0.1,
        shapes,
      };

      Plotly.react('dist-chart', [histTrace], layout, { responsive: true });
    }

    async function loadDistribution() {
      const time = document.getElementById('time-sel').value;
      const metric = document.getElementById('metric-sel').value;
      const useLatest = document.getElementById('use-latest').checked;
      let url = `/api/history/distribution?time=${time}&metric=${metric}`;
      if (!useLatest) {
        const date = document.getElementById('current-date-sel').value;
        const customTime = document.getElementById('current-time-sel').value;
        if (date && customTime) {
          url += `&current_date=${date}&current_time=${customTime}`;
        }
      }
      document.getElementById('status').textContent = 'Loading...';
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        distData = await r.json();
        if (distData.error) throw new Error(distData.error);
        document.getElementById('status').textContent = `${distData.n_samples} samples`;
        renderDistribution();
      } catch (e) {
        document.getElementById('status').innerHTML = '<span class="error">Error: ' + e.message + '</span>';
        console.error(e);
      }
    }

    loadDistribution();
  </script>
</body>
</html>
